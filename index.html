<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="body-color body overflow-hidden">

    <nav class="navbar navbar-expand-lg bg-black overflow-hidden">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#" id="reload">Get Weather</a>
            <form class="d-flex justify-content-end form" role="search">
                <input class="form-control me-1 w-50" type="search" placeholder="Search" aria-label="Search" id="input">
                <button class="btn text-white btn-outline-light bg-black" id="btn" type="submit">Search</button>
            </form>
        </div>
        </div>
        </div>
    </nav>

    <main class="main">
        <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">
            <div class="col m-auto">
                <div class="card mb-4 rounded-3 w-75 m-auto">
                    <div class="card-header py-3 text-white bg-black">
                        <h4 class="my-0 fw-normal" id="city-name">Weather for Mumbai</h4>
                    </div>
                    <div class="card-body px-2 text-bold">
                        <h1 class="card-title pricing-card-title" id="degree"></h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li id="humidity"></li>
                            <li id="feelslike"></li>
                            <li id="maxtemp"></li>
                            <li id="mintemp"></li>
                            <li id="windspeed"></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
