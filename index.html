<body class="body-color overflow-hidden ">

    <nav class="navbar navbar-expand-lg bg-black">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#" id="reload">Get Weather</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div id="navbarSupportedContent">
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" id="input">
                    <button class="btn text-white btn-outline-light" id="btn" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main>
        <div class="row row-cols-1 row-cols-md-3 mb-3 text-center mt-5">
            <div class="col m-auto mt-4">
                <div class="card mb-4 rounded-3 shadow-sm w-75 shadow-lg">
                    <div class="card-header py-3 bg-black text-white">
                        <h4 class="my-0 fw-normal" id="city-name">Weather for Mumbai</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title" id="degree"><small
                                class="text-body-secondary fw-light"></small></h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li id="humidity"></li>
                            <li id="feels-like"></li>
                            <li id="max-temp"></li>
                            <li id="min-temp"></li>
                            <li id="sea-level"></li>
                        </ul>
                    </div>
                </div>
            </div>
