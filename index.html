<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="body-color overflow-hidden">

    <nav class="navbar navbar-expand-lg bg-black">
        <div class="container-fluid">
            <a class="navbar-brand text-white space" href="#" id="reload">Get Weather</a>
            <form class="d-flex justify-content-end space" role="search">
                <input class="form-control me-2 w-50" type="search" placeholder="Search" aria-label="Search" id="input">
                <button class="btn text-white btn-outline-light" id="btn" type="submit">Search</button>
            </form>
        </div>
        </div>
        </div>
    </nav>

    <main>
        <div class="row row-cols-1 row-cols-md-3 mb-3 text-center mt-5">
            <div class="col m-auto mt-4">
                <div class="card mb-4 rounded-3 shadow-sm w-75 shadow-lg m-auto">
                    <div class="card-header py-3 bg-black text-white">
                        <h4 class="my-0 fw-normal font" id="city-name">Weather for Mumbai</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title" id="degree"><small
                                class="text-body-secondary fw-light"></small></h1>
                        <ul class="list-unstyled mt-3 mb-4">
                            <li id="humidity"></li>
                            <li id="feels-like"></li>
                            <li id="max-temp"></li>
                            <li id="min-temp"></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
